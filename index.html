<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çaçan Köfte & Kumru</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <h1 class="logo">
            🍔 ÇAÇAN KÖFTE & KUMRU
        </h1>

        <p class="subtitle">
            Lezzetin Adresi
        </p>

    </header>

    <!-- ARAMA -->

    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Ürün ara..."
        >

    </section>

    <!-- KATEGORİLER -->

    <nav id="category-nav"></nav>

    <!-- MENÜ -->

    <main id="menu-container">

        <p class="loading">
            Menü yükleniyor...
        </p>

    </main>

    <!-- SABİT SEPET -->

    <aside id="cart-panel">

        <div class="cart-header">

            <span>🛒 Sepet</span>

            <span id="cart-count">
                0 Ürün
            </span>

        </div>

        <div id="cart-items"></div>

        <div class="cart-total">

            Toplam:
            <span id="total-price">
                0 ₺
            </span>

        </div>

        <input
            type="number"
            id="table-number"
            placeholder="Masa No"
        >

        <button id="send-order-btn">
            Siparişi Gönder
        </button>

    </aside>

    <script src="script.js"></script>

</body>

</html>
