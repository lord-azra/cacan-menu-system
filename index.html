<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÇAÇAN KÖFTE & KUMRU</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>ÇAÇAN KÖFTE & KUMRU</h1>
</header>

<section class="search-section">
    <input id="searchInput" type="text" placeholder="Ürün ara...">
</section>

<nav id="category-nav" class="category-nav"></nav>

<main id="menu-container">Menü yükleniyor...</main>

<aside id="cart-panel">
    <h2>Sepet</h2>
    <div id="cart-items"></div>
    <p><strong><span id="cart-count">0 Ürün</span> | Toplam: <span id="total-price">0 ₺</span></strong></p>
    
    <input id="tableNo" type="text" placeholder="Masa No (Örn: 5)">
    
    <button onclick="sendWhatsApp()" id="sendOrderBtn">Siparişi Gönder</button>
    <button onclick="clearCart()" style="background: #a0522d;">Sepeti Temizle</button>
</aside>

<script src="script.js"></script>
</body>
</html>
