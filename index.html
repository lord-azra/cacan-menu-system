<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çaçan Köfte & Kumru</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>ÇAÇAN KÖFTE & KUMRU</h1>
    </header>

    <!-- NAV -->
    <nav id="category-nav"></nav>

    <!-- ARAMA -->
    <input id="searchInput" type="text" placeholder="Ürün ara..." />

    <!-- MENÜ -->
    <main id="menu-container">
        <p>Menü yükleniyor...</p>
    </main>

    <!-- SEPET PANELİ -->
    <div id="cart-panel">
        <h3>Sepet</h3>

        <div id="cart-items"></div>

        <p id="cart-count">0 Ürün</p>
        <p id="total-price">0 ₺</p>

        <input id="tableNo" type="number" placeholder="Masa No" />

        <button onclick="sendWhatsApp()">
            Siparişi Gönder
        </button>
    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
